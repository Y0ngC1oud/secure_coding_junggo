{% extends "base.html" %}
{% block title %}신고하기 - Tiny Market{% endblock %}
{% block content %}
  <div class="card" style="max-width:420px;margin:0 auto;">
    <h1>신고하기</h1>
    <p style="color:#666;">신고 대상: {{ target_label }}</p>
    <form class="stacked" method="post" novalidate>
      {{ form.hidden_tag() }}
      <label for="{{ form.reason.id }}">{{ form.reason.label.text }}</label>
      {{ form.reason(id=form.reason.id, rows=4) }}
      {% for error in form.reason.errors %}<div class="flash error">{{ error }}</div>{% endfor %}
      <button class="btn danger" type="submit" style="margin-top:16px;width:100%;">신고 제출</button>
    </form>
  </div>
{% endblock %}
